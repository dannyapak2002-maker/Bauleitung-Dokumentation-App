<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Baustellen" />
  <title>Baustellen-Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Inter', system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; }
    #header { background: #1c1c1c; color: #fff; padding: 18px 16px 0; position: sticky; top: 0; z-index: 100; }
    #header .label { font-size: 11px; letter-spacing: 2px; color: #f0c040; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    #header h1 { font-size: 22px; font-weight: 900; margin-bottom: 14px; }
    #tabs { display: flex; }
    .tab-btn { background: transparent; color: #aaa; border: none; border-radius: 6px 6px 0 0; padding: 9px 16px; font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; }
    .tab-btn.active { background: #f0c040; color: #1c1c1c; }
    #content { max-width: 700px; margin: 0 auto; padding: 20px 14px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
    .card-yellow { background: #fffbef; border: 1px solid #f0c040; }
    .card-warn { background: #fff8e1; border-left: 3px solid #f0c040; border-radius: 4px; padding: 10px 14px; margin-top: 12px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 3px; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; outline: none; background: #fff; }
    .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }
    .btn { border: none; border-radius: 6px; padding: 9px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; letter-spacing: 0.3px; }
    .btn-primary { background: #1c1c1c; color: #f0c040; }
    .btn-secondary { background: #f4f4f4; color: #333; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-icon { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; line-height: 1; padding: 2px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; background: #1c1c1c; color: #f0c040; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; text-transform: uppercase; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-header h2 { font-size: 20px; font-weight: 800; }
    .meta { font-size: 13px; color: #666; margin-top: 2px; }
    .meta-label { font-size: 12px; font-weight: 700; color: #888; letter-spacing: 1px; margin-bottom: 6px; }
    .card-title { font-weight: 800; font-size: 16px; }
    .empty { font-size: 14px; color: #aaa; text-align: center; padding: 30px; }
    .aufgabe-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
    .aufgabe-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: #1c1c1c; flex-shrink: 0; }
    .aufgabe-row span { flex: 1; font-size: 14px; }
    .aufgabe-row span.done { text-decoration: line-through; color: #aaa; }
    .add-aufgabe-row { display: flex; gap: 8px; margin-top: 10px; }
    .add-aufgabe-row input { flex: 1; padding: 7px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; font-family: inherit; }
    .card-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-header-row .left { flex: 1; cursor: pointer; }
    .card-header-row .right { display: flex; gap: 5px; margin-left: 10px; flex-shrink: 0; }
    .expanded-content { margin-top: 14px; }
    .preview { font-size: 13px; color: #666; margin-top: 6px; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .tagebuch-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .tagebuch-date { font-weight: 800; font-size: 16px; }
    .tagebuch-temp { font-size: 13px; color: #888; }
    .ma-badge { font-size: 12px; background: #f0f0f0; border-radius: 4px; padding: 2px 7px; color: #555; font-weight: 600; }
    .einkauf-meta { font-size: 13px; color: #666; margin: 4px 0; line-height: 1.8; }
    .einkauf-meta span { margin-right: 12px; }
    .filter-select { padding: 7px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; margin-bottom: 14px; }
    .status-open { color: #c0392b; font-weight: 700; }
    .status-done { color: #27ae60; font-weight: 700; }
    .tagesbericht-text { font-size: 14px; line-height: 1.65; color: #1c1c1c; white-space: pre-wrap; }
  </style>
</head>
<body>

<div id="header">
  <div class="label">Bauleitung</div>
  <h1>Baustellen-Manager</h1>
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab(0)">Baustellen</button>
    <button class="tab-btn" onclick="showTab(1)">Bautagebuch</button>
    <button class="tab-btn" onclick="showTab(2)">Einkäufe</button>
  </div>
</div>

<div id="content">
  <div class="tab-panel active" id="panel-0"></div>
  <div class="tab-panel" id="panel-1"></div>
  <div class="tab-panel" id="panel-2"></div>
</div>

<script src="app.js"></script>
</body>
</html>
